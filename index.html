<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Painel de Treino</title>

<!-- PWA: permite instalar como app e abrir sem a barra de endereço -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0E1013">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Treino">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght=500;600;700&family=Inter:wght=400;500;600;700;800&display=swap" rel="stylesheet">
<!-- Importação do Chart.js para o Gráfico Interativo da tela de Perfil -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root{
    --bg: #0E1013;
    --surface: #1A1D23;
    --text: #F2F1ED;
    --text-dim: #9A9CA5;
    --text-faint: #63656E;
    --amber: #FF7A3D;
    --amber-2: #FFB088;
    --amber-light: #FFB088;
    --green-accent: #5CE1B2;
    --blue-accent: #4B90FF;
    --card-bg: #14171C;
    --text-secondary: #8E919A;
    --border: rgba(255, 255, 255, 0.05);
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  html{
    height: 100%;
    overflow-x: hidden;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }

  body {
    background-color: #050505;
    font-family: 'Inter', sans-serif;
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    min-height: 100dvh;
    width: 100%;
    overflow-x: hidden;
    overscroll-behavior-y: none;
    -webkit-tap-highlight-color: transparent;
  }

  .device{
    width: 100%;
    max-width: 430px;
    height: 100vh;
    height: 100dvh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow-y: auto;
    overflow-x: hidden;
    overscroll-behavior-y: contain;
    touch-action: pan-y;
    scrollbar-width: none; /* Firefox */
  }
  .device::-webkit-scrollbar { display: none; } /* Chrome/Safari */

  /* CONTEÚDO PRINCIPAL */
  .content{
    padding: 24px 20px 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    flex-grow: 1;
  }

  /* BARRA DE NAVEGAÇÃO INFERIOR */
  .bottom-nav {
    position: sticky;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 76px;
    background: #0E1013;
    border-top: 1.5px solid rgba(255, 255, 255, 0.03);
    display: flex;
    justify-content: space-around;
    align-items: center;
    z-index: 1000;
    flex-shrink: 0;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
  }

  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    gap: 6px;
    flex: 1;
    height: 100%;
    color: #4B4D54; /* Cor inativa */
    transition: color 0.2s ease;
  }

  .nav-item svg {
    width: 24px;
    height: 24px;
    transition: transform 0.2s ease;
  }

  .nav-item span {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.01em;
  }

  /* Estado Ativo: Tom salmão/laranja da foto */
  .nav-item.active {
    color: #FFB088; 
  }

  .nav-item:hover svg {
    transform: translateY(-1px);
  }

  /* ==================================================== */
  /* ========= MODAL GLOBAL: CONQUISTA DESBLOQUEADA ====== */
  /* ==================================================== */

  .achievement-unlock-overlay {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    height: 100%;
    background: rgba(5, 5, 5, 0.88);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 6000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    padding: 24px;
    box-sizing: border-box;
  }

  .achievement-unlock-overlay.active {
    opacity: 1;
    pointer-events: all;
  }

  .achievement-unlock-card {
    position: relative;
    width: 100%;
    background: radial-gradient(circle at 50% 0%, rgba(255, 122, 61, 0.18) 0%, rgba(26, 29, 35, 0) 60%), var(--surface);
    border: 1.8px solid var(--amber);
    border-radius: 28px;
    padding: 32px 24px 24px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(255, 122, 61, 0.25);
    transform: scale(0.82) translateY(16px);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .achievement-unlock-overlay.active .achievement-unlock-card {
    transform: scale(1) translateY(0);
  }

  .achievement-unlock-eyebrow {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--amber-2);
    font-weight: 700;
    margin-bottom: 16px;
  }

  .achievement-unlock-badge {
    width: 108px;
    height: 108px;
    margin: 0 auto 18px;
    filter: drop-shadow(0px 6px 16px rgba(255, 122, 61, 0.4));
  }

  .achievement-unlock-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
  }

  .achievement-unlock-desc {
    font-size: 14px;
    line-height: 1.4;
    color: var(--text-dim);
    margin-bottom: 26px;
  }

  .achievement-unlock-btn {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    background: var(--amber);
    color: #000;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .achievement-unlock-btn:active {
    transform: scale(0.97);
    background: var(--amber-2);
  }

  /* ==================================================== */
  /* ================ TELA: INÍCIO ======================= */
  /* ==================================================== */

  /* HEADER */
  #tela-inicio .header{
    padding: 32px 20px 20px;
    background: linear-gradient(180deg, #1B1C22 0%, #101116 100%);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    flex-shrink: 0;
    margin: -24px -20px 0;
  }

  #tela-inicio .header-top{
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  #tela-inicio .header-top .label{
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #888;
    font-weight: 600;
  }

  #tela-inicio .week-controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #tela-inicio .week-nav-btn {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 8px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  #tela-inicio .week-nav-btn:hover:not(:disabled) {
    background: rgba(255, 255, 255, 0.15);
  }

  #tela-inicio .week-nav-btn:disabled {
    opacity: 0.25;
    cursor: not-allowed;
  }

  #tela-inicio .day-strip{
    display: flex;
    justify-content: space-between;
    gap: 6px;
    padding: 8px 0;
  }

  /* DAY-PILL */
  #tela-inicio .day-pill{
    flex: 1;
    min-width: 0;
    height: 76px;
    background: #1F232B;
    border: 2px solid transparent;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    transition: all 0.25s ease;

    font-family: inherit;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }

  #tela-inicio .day-pill:hover:not(:disabled){
    transform: translateY(-2px);
  }

  #tela-inicio .day-pill:focus-visible {
    outline: 2px solid var(--amber-2);
    outline-offset: 2px;
  }

  #tela-inicio .day-pill .num {
    color: #FFFFFF;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 700;
  }

  #tela-inicio .day-pill .dow {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: rgba(255, 255, 255, 0.6);
    font-weight: 500;
  }

  #tela-inicio .day-pill.selected {
    border-color: var(--amber);
  }

  #tela-inicio .day-pill.today{
    background: linear-gradient(160deg, var(--amber), #FF9A5E);
    border-color: #FFBB8A;
    box-shadow: 0 4px 12px rgba(255,122,61,0.4);
  }

  #tela-inicio .day-pill.today .num,
  #tela-inicio .day-pill.today .dow{
    color: #FFFFFF !important;
    opacity: 1 !important;
    font-weight: 700;
  }

  #tela-inicio .day-pill.past.workout .num {
    color: var(--amber) !important;
  }
  #tela-inicio .day-pill.past.workout .dow {
    color: var(--amber-2) !important;
  }

  #tela-inicio .day-pill.past.no-workout {
    opacity: 0.4;
  }
  #tela-inicio .day-pill.past.no-workout .num {
    color: var(--text-dim) !important;
  }
  #tela-inicio .day-pill.past.no-workout .dow {
    color: var(--text-faint) !important;
  }

  #tela-inicio .day-pill:disabled {
    cursor: not-allowed;
    opacity: 0.25;
  }

  /* CONTEÚDO DO DASHBOARD */
  #tela-inicio .dashboard-content{
    padding: 24px 0 0;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  /* CARD FRASE DO DIA */
  #tela-inicio .quote-card{
    position: relative;
    background: radial-gradient(circle at 90% 50%, rgba(255, 122, 61, 0.15) 0%, rgba(26, 29, 35, 0) 70%), #16181D;
    border: 1.5px solid rgba(255, 255, 255, 0.04);
    border-radius: 28px;
    padding: 24px;
    overflow: hidden;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #tela-inicio .quote-info{
    max-width: 65%;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  #tela-inicio .quote-label{
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--amber-2);
    font-weight: 700;
  }

  #tela-inicio .quote-title{
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 22px;
    line-height: 1.25;
    color: var(--text);
    min-height: 54px;
    display: flex;
    align-items: center;
  }

  #tela-inicio .quote-subtext{
    font-size: 13.5px;
    line-height: 1.4;
    color: var(--text-dim);
  }

  #tela-inicio .quote-icon{
    flex-shrink: 0;
    margin-right: 8px;
  }

  /* SEÇÃO RESUMO DA SEMANA */
  #tela-inicio .summary-section{
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  #tela-inicio .section-title{
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: var(--text);
  }

  #tela-inicio .stats-grid{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  #tela-inicio .stat-card{
    background: #16181D;
    border: 1.5px solid rgba(255, 255, 255, 0.04);
    border-radius: 24px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  #tela-inicio .stat-header {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #tela-inicio .stat-icon-wrapper{
    width: 42px;
    height: 42px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #tela-inicio .stat-icon-wrapper.orange{
    background: rgba(255, 122, 61, 0.1);
  }

  #tela-inicio .stat-icon-wrapper.blue{
    background: rgba(75, 144, 255, 0.1);
  }

  #tela-inicio .stat-value{
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: 32px;
    line-height: 1;
  }

  #tela-inicio .stat-value.orange{
    color: var(--amber);
  }

  #tela-inicio .stat-value.blue{
    color: var(--blue-accent);
  }

  #tela-inicio .stat-label{
    font-size: 13.5px;
    color: #FFFFFF;
    font-weight: 800;
    line-height: 1.3;
  }

  /* SEÇÃO: HISTÓRICO */
  #tela-inicio .history-card {
    background: #16181D;
    border: 1.5px solid rgba(255, 255, 255, 0.04);
    border-radius: 28px;
    padding: 24px;
    display: flex;
    flex-direction: column;
  }

  #tela-inicio .history-header {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
  }

  #tela-inicio .history-list {
    display: flex;
    flex-direction: column;
  }

  #tela-inicio .history-empty {
    padding: 20px 4px 4px;
    font-size: 13.5px;
    color: var(--text-dim);
    text-align: center;
  }

  #tela-inicio .history-item {
    display: flex;
    align-items: center;
    padding: 16px 0;
    border-bottom: 1.5px solid rgba(255, 255, 255, 0.04);
    cursor: pointer;
    transition: background-color 0.2s ease;
  }

  #tela-inicio .history-item:last-child {
    border-bottom: none;
    padding-bottom: 4px;
  }

  #tela-inicio .history-item:hover {
    background-color: rgba(255, 255, 255, 0.01);
  }

  #tela-inicio .history-date {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 52px;
    margin-right: 16px;
  }

  #tela-inicio .history-date .day-num {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 24px;
    font-weight: 700;
    line-height: 1;
  }

  #tela-inicio .history-item.workout .day-num {
    color: var(--amber);
  }

  #tela-inicio .history-item.body-info .day-num {
    color: var(--blue-accent);
  }

  #tela-inicio .history-date .day-name {
    font-size: 11px;
    text-transform: uppercase;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--text-faint);
    margin-top: 4px;
  }

  #tela-inicio .history-info {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  #tela-inicio .history-info-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }

  #tela-inicio .history-info-desc {
    font-size: 13.5px;
    color: var(--text-dim);
  }

  #tela-inicio .history-chevron {
    color: var(--text-faint);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-left: 8px;
  }

  /* SEÇÃO: GRUPOS MUSCULARES */
  #tela-inicio .muscles-section {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  #tela-inicio .section-header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #tela-inicio .section-header-link {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--amber);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  #tela-inicio .muscles-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }

  #tela-inicio .muscle-status-card {
    background: #16181D;
    border: 1.5px solid rgba(255, 255, 255, 0.04);
    border-radius: 24px;
    padding: 20px;
    display: flex;
    align-items: stretch;
    gap: 16px;
  }

  #tela-inicio .muscle-body-visual {
    flex-shrink: 0;
    width: 105px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #tela-inicio .muscle-body-visual img {
    width: 100%;
    height: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 8px;
  }

  #tela-inicio .muscle-bars-list {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 4px;
  }

  #tela-inicio .muscle-bar-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  #tela-inicio .muscle-bar-info {
    display: flex;
    justify-content: space-between;
    font-size: 11.5px;
    font-weight: 600;
  }

  #tela-inicio .muscle-bar-name {
    color: var(--text-dim);
  }

  #tela-inicio .muscle-bar-value {
    color: var(--text);
  }

  #tela-inicio .muscle-bar-track {
    height: 6px;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 3px;
    overflow: hidden;
  }

  #tela-inicio .muscle-bar-fill {
    height: 100%;
    background: var(--amber);
    border-radius: 3px;
  }

  /* ==================================================== */
  /* ================ TELA: HISTÓRICO ==================== */
  /* ==================================================== */

  #tela-historico {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: #121214;
    color: #FFFFFF;
    border-radius: 20px;
    padding: 16px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
  }

  #tela-historico .header { margin-top: 0; margin-bottom: 24px; }
  #tela-historico .header h2 { font-size: 14px; color: #A8A8B3; margin: 0; font-weight: 400; }
  #tela-historico .header h1 { font-size: 28px; color: #FF6C22; margin: 4px 0 0 0; text-transform: uppercase; font-weight: 800; }

  #tela-historico .calendar-card { background-color: #1E1715; border-radius: 16px; padding: 16px; margin-bottom: 20px; }
  #tela-historico .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  #tela-historico .month-selector { font-size: 16px; font-weight: bold; color: #FFFFFF; background: none; border: none; cursor: pointer; }
  #tela-historico .nav-arrows button { background: none; border: none; color: #A8A8B3; font-size: 18px; cursor: pointer; padding: 0 8px; }
  #tela-historico .nav-arrows button:hover { color: #FF6C22; }

  #tela-historico .weekdays-grid,
  #tela-historico .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; }
  #tela-historico .weekdays-grid { color: #7C7C8A; font-size: 12px; font-weight: bold; margin-bottom: 12px; }

  #tela-historico .day { background: none; border: none; color: #7C7C8A; font-size: 14px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; margin: 4px 0; z-index: 1; font-family: inherit; }
  #tela-historico .day.has-workout { color: #FF6C22; font-weight: bold; }
  #tela-historico .day.disabled { color: #3A3A40 !important; cursor: not-allowed !important; pointer-events: none; }

  #tela-historico .day.range-single { background-color: #FF6C22 !important; color: #121214 !important; font-weight: bold !important; border-radius: 50%; }
  #tela-historico .day.range-start { background-color: #FF6C22 !important; color: #121214 !important; font-weight: bold !important; border-top-left-radius: 20px; border-bottom-left-radius: 20px; border-top-right-radius: 0; border-bottom-right-radius: 0; }
  #tela-historico .day.range-mid { background-color: rgba(255, 108, 34, 0.2) !important; color: #FF6C22 !important; font-weight: bold !important; border-radius: 0; }
  #tela-historico .day.range-end { background-color: #FF6C22 !important; color: #121214 !important; font-weight: bold !important; border-top-right-radius: 20px; border-bottom-right-radius: 20px; border-top-left-radius: 0; border-bottom-left-radius: 0; }
  #tela-historico .day.circle-highlight { border: 2px solid #FF6C22; border-radius: 50%; color: #FF6C22 !important; font-weight: bold; }
  #tela-historico .day.circle-highlight.range-single,
  #tela-historico .day.circle-highlight.range-start,
  #tela-historico .day.circle-highlight.range-end { color: #121214 !important; border-color: transparent; }

  #tela-historico .panel { display: none; }
  #tela-historico .panel.active { display: block; }
  #tela-historico .panel-title { font-size: 18px; font-weight: bold; margin-bottom: 16px; }
  #tela-historico .empty-history-msg { color: #7C7C8A; font-size: 14px; text-align: center; padding: 24px; }

  #tela-historico .history-card { display: flex; flex-direction: column; gap: 12px; }

<script>
  /* ============================================================ */
  /* ============  MOTOR DE ESTATÍSTICAS / CONQUISTAS  =========== */
  /* ============================================================ */
  /* Centraliza os dados que alimentam a tela de Conquistas,       */
  /* lidos e gravados a partir das telas de Exercícios e Perfil.   */

  const ACHIEVEMENTS_STORAGE_KEY = 'app_achievement_stats';

  function getStats() {
    const defaults = {
      exerciciosTotal: 0,
      exerciciosPorMusculo: { peito: 0, costas: 0, biceps: 0, triceps: 0, ombro: 0, pernas: 0 },
      diasTreinados: [],
      pesoInicial: null,
      pesoAtual: null,
      conquistasVistas: [],
      diario: {}
    };
    try {
      const salvo = JSON.parse(localStorage.getItem(ACHIEVEMENTS_STORAGE_KEY));
      if (!salvo) return defaults;
      return Object.assign({}, defaults, salvo, {
        exerciciosPorMusculo: Object.assign({}, defaults.exerciciosPorMusculo, salvo.exerciciosPorMusculo || {}),
        conquistasVistas: Array.isArray(salvo.conquistasVistas) ? salvo.conquistasVistas : [],
        diario: salvo.diario || {}
      });
    } catch (e) {
      return defaults;
    }
  }

  function saveStats(stats) {

  function calcularDiasConsecutivos(diasTreinados) {
    if (!diasTreinados || diasTreinados.length === 0) return 0;
    const umDia = 24 * 60 * 60 * 1000;
    const setDatas = new Set(diasTreinados.map(d => {
      const [y, m, dd] = d.split('-').map(Number);
      return new Date(y, m - 1, dd).getTime();
    }));
    const hoje = new Date(); hoje.setHours(0, 0, 0, 0);
    let cursor = hoje.getTime();
    // Se hoje ainda não treinou, a sequência conta a partir de ontem
    if (!setDatas.has(cursor)) cursor -= umDia;
    let streak = 0;
    while (setDatas.has(cursor)) {
      streak++;
      cursor -= umDia;
    }
    return streak;
  }

  // Calcula o progresso atual de uma conquista a partir das estatísticas
  function calcularProgressoConquista(id, stats, diasConsecutivos) {
    const cfg = ACHIEVEMENTS_CONFIG[id];
    if (!cfg) return { atual: 0, atingiu: false };
    let atual = 0;
    if (cfg.tipo === 'peso_perdido') {
      if (stats.pesoInicial !== null && stats.pesoAtual !== null) atual = Math.max(0, stats.pesoInicial - stats.pesoAtual);
    } else if (cfg.tipo === 'peso_ganho') {
      if (stats.pesoInicial !== null && stats.pesoAtual !== null) atual = Math.max(0, stats.pesoAtual - stats.pesoInicial);
    } else if (cfg.tipo === 'exercicios_total') {
      atual = stats.exerciciosTotal;
    } else if (cfg.tipo === 'exercicios_musculo') {
      atual = stats.exerciciosPorMusculo[cfg.musculo] || 0;
    } else if (cfg.tipo === 'dias_treinados') {
      atual = stats.diasTreinados.length;
    } else if (cfg.tipo === 'dias_consecutivos') {
      atual = diasConsecutivos;
    }
    return { atual: Math.min(atual, cfg.meta), atingiu: atual >= cfg.meta };
  }

  // Compara o progresso atual com o que já foi visto antes e enfileira as conquistas novas
  function checarNovasConquistas() {
    const stats = getStats();
    if (!Array.isArray(stats.conquistasVistas)) stats.conquistasVistas = [];
    const diasConsecutivos = calcularDiasConsecutivos(stats.diasTreinados);
    let mudou = false;

    Object.keys(ACHIEVEMENTS_CONFIG).forEach(id => {
      const { atingiu } = calcularProgressoConquista(id, stats, diasConsecutivos);
      if (atingiu && !stats.conquistasVistas.includes(id)) {
        stats.conquistasVistas.push(id);
        filaNotificacaoConquistas.push(id);
        mudou = true;
      }
    });

    if (mudou) {
      saveStats(stats);
      mostrarProximaConquistaNaFila();
    }
  }

  // Lê as estatísticas reais e atualiza cada card da tela de Conquistas
  function atualizarConquistas() {
    const stats = getStats();
    const diasConsecutivos = calcularDiasConsecutivos(stats.diasTreinados);

    document.querySelectorAll('#tela-conquistas .achievement-card[data-achievement]').forEach(card => {
      const id = card.getAttribute('data-achievement');
      const cfg = ACHIEVEMENTS_CONFIG[id];
      if (!cfg) return;

      let atual = 0;
      if (cfg.tipo === 'peso_perdido') {
        if (stats.pesoInicial !== null && stats.pesoAtual !== null) atual = Math.max(0, stats.pesoInicial - stats.pesoAtual);
      } else if (cfg.tipo === 'peso_ganho') {
        if (stats.pesoInicial !== null && stats.pesoAtual !== null) atual = Math.max(0, stats.pesoAtual - stats.pesoInicial);
      } else if (cfg.tipo === 'exercicios_total') {
        atual = stats.exerciciosTotal;
      } else if (cfg.tipo === 'exercicios_musculo') {
        atual = stats.exerciciosPorMusculo[cfg.musculo] || 0;
      } else if (cfg.tipo === 'dias_treinados') {
        atual = stats.diasTreinados.length;
      } else if (cfg.tipo === 'dias_consecutivos') {
        atual = diasConsecutivos;
      }

      atual = Math.min(atual, cfg.meta);
      const atingiu = atual >= cfg.meta;
      card.classList.toggle('unlocked', atingiu);
      card.classList.toggle('locked', !atingiu);

      const bar = card.querySelector('.progress-bar');
      const text = card.querySelector('.progress-text');
      const pct = Math.min(100, Math.round((atual / cfg.meta) * 100));
      if (bar) bar.style.width = pct + '%';
      if (text) {
        const original = text.textContent;
        const sufixoMatch = original.match(/\/\s*[\d.,]+\s*(.*)$/);
        const sufixo = sufixoMatch ? sufixoMatch[1].trim() : '';
        const metaFormatada = cfg.meta.toLocaleString('pt-BR');
        const atualFormatado = cfg.unidade === 'kg'
          ? atual.toFixed(1).replace('.', ',')
          : Math.floor(atual).toLocaleString('pt-BR');
        text.textContent = `${atualFormatado} / ${metaFormatada}${sufixo ? ' ' + sufixo : ''}`;
      }
    });
  }

      if (nomes.length === 1) return nomes[0];
      return nomes.slice(0, -1).join(', ') + ' e ' + nomes[nomes.length - 1];

    function getMondayOfDate(d) {
      const date = new Date(d);
      const day = date.getDay();
      const diff = date.getDate() - day + (day === 0 ? -6 : 1);
      return new Date(date.setDate(diff));

      const checkDate = new Date(d1.getFullYear(), d1.getMonth(), d1.getDate());
      const referenceDate = new Date(d2.getFullYear(), d2.getMonth(), d2.getDate());
      return checkDate.getTime() > referenceDate.getTime();

      return d1.getFullYear() === d2.getFullYear() &&

      for (let i = 0; i < 7; i++) {
        const loopDate = new Date(currentWeekStart);
        loopDate.setDate(currentWeekStart.getDate() + i);
        const chave = formatarDataChave(loopDate);
        const registrosDoDia = diario[chave];
        if (registrosDoDia && Object.keys(registrosDoDia).length > 0) {
          diasComTreino.add(chave);
          Object.keys(registrosDoDia).forEach(m => musculosNaSemana.add(m));
        }
      }

      if (statDiasTreinadosEl) statDiasTreinadosEl.textContent = diasComTreino.size;
      if (statMusculosTrabalhandoEl) statMusculosTrabalhandoEl.textContent = musculosNaSemana.size;
    }

    function renderHomeHistoryList() {
      if (!homeHistoryList) return;
      const stats = getStats();
      const diario = stats.diario || {};

      const datasOrdenadas = Object.keys(diario)
        .filter(chave => diario[chave] && Object.keys(diario[chave]).length > 0)
        .sort((a, b) => b.localeCompare(a))
        .slice(0, 3);

      if (datasOrdenadas.length === 0) {
        homeHistoryList.innerHTML = `<div class="history-empty" id="homeHistoryEmpty">Nenhum treino registrado ainda. Comece hoje!</div>`;
        return;
      }

      homeHistoryList.innerHTML = datasOrdenadas.map(chave => {
        const [ano, mes, dia] = chave.split('-').map(Number);
        const dataObj = new Date(ano, mes - 1, dia);
        const nomeDia = dowNamesShort[dataObj.getDay()];
        const musculos = Object.keys(diario[chave]);
        const descricao = juntarNomesMusculos(musculos);
        return `
          <div class="history-item workout">
            <div class="history-date">
              <span class="day-num">${String(dia).padStart(2, '0')}</span>
              <span class="day-name">${nomeDia}</span>
            </div>
            <div class="history-info">
              <div class="history-info-title">Treino</div>
              <div class="history-info-desc">${descricao}</div>
            </div>
            <div class="history-chevron">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M9 5L16 12L9 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderWeek() {
      dayStrip.innerHTML = "";
      calendarMonthLabel.textContent = `${monthNames[currentWeekStart.getMonth()]} ${currentWeekStart.getFullYear()}`;

      for (let i = 0; i < 7; i++) {
        const loopDate = new Date(currentWeekStart);
        loopDate.setDate(currentWeekStart.getDate() + i);

        const dayNum = loopDate.getDate();
        const dowName = dowNamesShort[loopDate.getDay()];

        const button = document.createElement('button');
        button.className = "day-pill";
        button.setAttribute('data-full-date', loopDate.toISOString());

        button.innerHTML = `
          <span class="num">${dayNum}</span>
          <span class="dow">${dowName}</span>
        `;

        const isFuture = isFutureDate(loopDate, realToday);
        const isToday = isSameDay(loopDate, realToday);
        const isPast = !isFuture && !isToday;

        if (isFuture) {
          button.disabled = true;
        } else {
          if (isToday) {
            button.classList.add('today');
          } else if (isPast) {
            button.classList.add('past');
            const stats = getStats();
            const registroDoDia = stats.diario && stats.diario[formatarDataChave(loopDate)];
            if (registroDoDia && Object.keys(registroDoDia).length > 0) {
              button.classList.add('workout');
            } else {
              button.classList.add('no-workout');
            }
          }

          button.addEventListener('click', () => {
            document.querySelectorAll('.day-pill').forEach(b => b.classList.remove('selected'));
            button.classList.add('selected');
            activeSelectedDate = new Date(loopDate);
            updateQuote(dayNum);
          });
        }

        if (isSameDay(loopDate, activeSelectedDate)) {
          button.classList.add('selected');
          updateQuote(dayNum);
        }

        dayStrip.appendChild(button);
      }

      const nextWeekFirstDay = new Date(currentWeekStart);
      nextWeekFirstDay.setDate(currentWeekStart.getDate() + 7);

      if (isFutureDate(nextWeekFirstDay, realToday)) {
        nextWeekBtn.disabled = true;
      } else {
        nextWeekBtn.disabled = false;
      }
    }

    prevWeekBtn.addEventListener('click', () => {
      currentWeekStart.setDate(currentWeekStart.getDate() - 7);
      renderWeek();
      renderResumoSemanal();
    });

    nextWeekBtn.addEventListener('click', () => {
      currentWeekStart.setDate(currentWeekStart.getDate() + 7);
      renderWeek();
      renderResumoSemanal();
    });

    renderWeek();
    renderMuscleChart();
    renderResumoSemanal();
    renderHomeHistoryList();
  }

  function iniciarLogicaTelaHistorico() {
    const workoutDatabase = {
      "2026-07-01": [{ type: "forca", title: "Treino A - Peito e Tríceps", subtitle: "5 exercícios • 45 min" }],
      "2026-07-02": [{ type: "cardio", title: "Corrida na Esteira", subtitle: "30 minutos • HIIT" }],
      "2026-07-07": [{ type: "forca", title: "Treino B - Costas e Bíceps", subtitle: "6 exercícios • 50 min" }],
      "2026-07-13": [{ type: "forca", title: "Treino C - Pernas Completo", subtitle: "6 exercícios • 60 min" }],
      "2026-07-14": [{ type: "cardio", title: "Pedalada Indoor", subtitle: "40 minutos • Moderado" }],
      "2026-07-16": [{ type: "forca", title: "Treino D - Ombros e Abdômen", subtitle: "5 exercícios • 40 min" }]
    };

    const today = new Date();
    today.setHours(0, 0, 0, 0);

    let currentMonth = 6;
    let currentYear = 2026;
    let rangeStart = new Date(2026, 6, 5);
    let rangeEnd = new Date(2026, 6, 11);

    const weekdaysShort = ['DOM', 'SEG', 'TER', 'QUA', 'QUI', 'SEX', 'SÁB'];
    const monthNames = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

    const calendarGrid = document.getElementById('calendar-grid');
    const monthLabel = document.getElementById('month-label');
    const historyContent = document.getElementById('history-content');

    function createMidnightDate(year, month, day) { return new Date(year, month, day, 0, 0, 0, 0); }

    function generateCalendar(month, year) {
      calendarGrid.innerHTML = '';
      monthLabel.textContent = `${monthNames[month]} ${year}`;
      const firstDayIndex = new Date(year, month, 1).getDay();
      const totalDays = new Date(year, month + 1, 0).getDate();
      for (let i = 0; i < firstDayIndex; i++) { calendarGrid.appendChild(document.createElement('div')); }
      for (let day = 1; day <= totalDays; day++) {
        const btn = document.createElement('button');
        btn.classList.add('day');
        btn.textContent = day;
        const thisDate = createMidnightDate(year, month, day);

        // BLOQUEIO DE DATAS FUTURAS
        if (thisDate > today) { btn.classList.add('disabled'); }

        const dateStr = formatDateString(thisDate);
        btn.setAttribute('data-date', dateStr);
        if (workoutDatabase[dateStr]) btn.classList.add('has-workout');

        if (!btn.classList.contains('disabled')) {
          btn.addEventListener('click', () => handleDayClick(thisDate));
        }
        calendarGrid.appendChild(btn);
      }
      updateCalendarRangeStyles();
    }

    function handleDayClick(clickedDate) {
      const clickedTime = clickedDate.getTime();
      if (!rangeStart || (rangeStart && rangeEnd)) { rangeStart = clickedDate; rangeEnd = null; }
      else {
        const startTime = rangeStart.getTime();
        if (clickedTime > startTime) rangeEnd = clickedDate;
        else if (clickedTime < startTime) { rangeStart = clickedDate; rangeEnd = null; }
        else { rangeStart = null; rangeEnd = null; }
      }
      updateCalendarRangeStyles();
      renderCombinedHistory();
    }

    function updateCalendarRangeStyles() {
      const dayButtons = document.querySelectorAll('#tela-historico .day');
      dayButtons.forEach(btn => {
        const dateParts = btn.getAttribute('data-date').split('-');
        const btnDate = createMidnightDate(parseInt(dateParts[0]), parseInt(dateParts[1]) - 1, parseInt(dateParts[2]));
        const timeVal = btnDate.getTime();
        btn.classList.remove('range-single', 'range-start', 'range-mid', 'range-end');
        if (rangeStart && !rangeEnd && timeVal === rangeStart.getTime()) btn.classList.add('range-single');
        else if (rangeStart && rangeEnd) {
          if (timeVal === rangeStart.getTime()) btn.classList.add('range-start');
          else if (timeVal === rangeEnd.getTime()) btn.classList.add('range-end');
          else if (timeVal > rangeStart.getTime() && timeVal < rangeEnd.getTime()) btn.classList.add('range-mid');
        }
      });
    }

    function renderCombinedHistory() {
      if (!rangeStart) { historyContent.innerHTML = `<div class="empty-history-msg">Selecione uma data para ver o histórico.</div>`; return; }
      const start = rangeStart;
      const end = rangeEnd ? rangeEnd : rangeStart;
      let combinedRecords = [];
      let loopDate = new Date(start.getTime());
      while (loopDate.getTime() <= end.getTime()) {
        const formatted = formatDateString(loopDate);
        if (workoutDatabase[formatted]) {
          workoutDatabase[formatted].forEach(record => {
            combinedRecords.push({ dayNum: loopDate.getDate(), dayName: weekdaysShort[loopDate.getDay()], ...record });
          });
        }
        loopDate.setDate(loopDate.getDate() + 1);
      }
      if (combinedRecords.length === 0) { historyContent.innerHTML = `<div class="empty-history-msg">Nenhum treino no período.</div>`; return; }
      let html = `<div class="history-card">`;
      combinedRecords.forEach(item => {
        html += `<a href="#" class="history-item ${item.type}"><div class="history-date"><span class="day-num">${item.dayNum}</span><span class="day-name">${item.dayName}</span></div><div class="history-info"><span class="history-title">${item.title}</span><span class="history-desc">${item.subtitle}</span></div><div class="history-chevron"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"></polyline></svg></div></a>`;
      });
      historyContent.innerHTML = html + `</div>`;
    }

    function formatDateString(date) { return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`; }

    document.getElementById('prev-month-btn').addEventListener('click', () => { currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; } generateCalendar(currentMonth, currentYear); });
    document.getElementById('next-month-btn').addEventListener('click', () => { currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; } generateCalendar(currentMonth, currentYear); });

    generateCalendar(currentMonth, currentYear);
    renderCombinedHistory();
  }

  let workoutDatabase = JSON.parse(localStorage.getItem('workout_db')) || DEFAULT_EXERCISES;

  const DEFAULT_HISTORY = {};
  let historyDatabase = JSON.parse(localStorage.getItem('workout_history_db')) || DEFAULT_HISTORY;

  function checkDailyReset() {
    const todayStr = new Date().toDateString(); 
    const lastSavedDate = localStorage.getItem('workout_last_date');
    if (lastSavedDate && lastSavedDate !== todayStr) {
      Object.keys(historyDatabase).forEach(muscle => {
        let todayLog = historyDatabase[muscle].find(h => h.date === "Hoje");
        if (todayLog && todayLog.exercises.length > 0) {
          todayLog.date = "Treino anterior";
        }
      });
      workoutDatabase.forEach(ex => { ex.completedToday = false; });
      saveDatabase();
      localStorage.setItem('workout_last_date', todayStr);
    } else if (!lastSavedDate) { localStorage.setItem('workout_last_date', todayStr); }
  }

  function saveDatabase() { localStorage.setItem('workout_db', JSON.stringify(workoutDatabase)); }

  const screenMuscleSelector = document.getElementById('screenMuscleSelector');
  const screenList = document.getElementById('screenList');
  const screenDetail = document.getElementById('screenDetail');
  const workoutMuscleTitle = document.getElementById('workoutMuscleTitle');
  const detailMuscleHeader = document.getElementById('detailMuscleHeader');

  function changeScreen(targetScreen) {
    screenMuscleSelector.classList.remove('active'); screenList.classList.remove('active'); screenDetail.classList.remove('active');
    if (targetScreen === 'inicio') { screenMuscleSelector.classList.add('active'); }
    else if (targetScreen === 'treinos') {
      let displayTitle = activeMuscleGroup === "pernas" ? "PERNA/GLÚTEO" : activeMuscleGroup.toUpperCase();
      workoutMuscleTitle.textContent = displayTitle;
      detailMuscleHeader.textContent = displayTitle;
      renderExercises(); screenList.classList.add('active');
    } else if (targetScreen === 'detail') { screenDetail.classList.add('active'); }
  }

  document.getElementById('backToMusclesBtn').addEventListener('click', () => changeScreen('inicio'));

  function registerMuscleBtnClick(btn, muscleId) {
    btn.addEventListener('click', (e) => {
      if (e.target.closest('.muscle-manage-btn')) return;
      activeMuscleGroup = muscleId.toLowerCase();
      changeScreen('treinos');
    });
  }

  const addModal = document.getElementById('add-modal');
  const muscleManageOverlay = document.getElementById('muscleManageOverlay');
  const deleteConfirmOverlay = document.getElementById('deleteConfirmOverlay');
  const input = document.getElementById('new-muscle-input');
  const inputMuscleName = document.getElementById('inputMuscleName');

  function openAddModal() { addModal.classList.add('active'); input.value = ""; setTimeout(() => input.focus(), 150); }
  function closeAddModal() { addModal.classList.remove('active'); }
  function openMuscleManageModal(muscleId) { selectedMuscleForManagement = muscleId.toLowerCase(); inputMuscleName.value = muscleId.charAt(0).toUpperCase() + muscleId.slice(1); muscleManageOverlay.classList.add('active'); }
  function closeMuscleManageModal() { muscleManageOverlay.classList.remove('active'); selectedMuscleForManagement = null; }

  const blockOverlay = document.getElementById('blockOverlay');
  function openBlockModal() { blockOverlay.classList.add('active'); }
  function closeBlockModal() { blockOverlay.classList.remove('active'); }

  function openDeleteConfirmModal() { deleteConfirmOverlay.classList.add('active'); }
  function closeDeleteConfirmModal() { deleteConfirmOverlay.classList.remove('active'); }

  function saveMuscleEdit() {
    const newName = inputMuscleName.value.trim();
    if (newName === "") return;
    const formattedNewName = newName.toLowerCase();
    const defaults = ['peito', 'costa', 'ombro', 'tríceps', 'bíceps', 'pernas'];

    if (selectedMuscleForManagement && selectedMuscleForManagement !== formattedNewName) {
      if (customMuscles.includes(formattedNewName) || defaults.includes(formattedNewName)) { alert("Grupo muscular já existente!"); return; }
      const idx = customMuscles.indexOf(selectedMuscleForManagement);
      if (idx !== -1) { customMuscles[idx] = formattedNewName; localStorage.setItem('custom_muscles', JSON.stringify(customMuscles)); }
      workoutDatabase.forEach(ex => { if (ex.muscle === selectedMuscleForManagement) ex.muscle = formattedNewName; });
      saveDatabase(); reloadMuscleDOMList();
    }
    closeMuscleManageModal();
  }

  function handleMuscleDeletion() {
    if (selectedMuscleForManagement) {
      if (confirm(`Remover o grupo muscular "${selectedMuscleForManagement.toUpperCase()}" e seus treinos?`)) {
        workoutDatabase = workoutDatabase.filter(ex => ex.muscle !== selectedMuscleForManagement);
        customMuscles = customMuscles.filter(m => m !== selectedMuscleForManagement);
        localStorage.setItem('custom_muscles', JSON.stringify(customMuscles));
        saveDatabase(); reloadMuscleDOMList(); closeMuscleManageModal();
      }
    }
  }

  function reloadMuscleDOMList() {
    const container = document.getElementById('muscle-container');
    const defaults = ['peito', 'costa', 'ombro', 'tríceps', 'bíceps', 'pernas'];
    container.querySelectorAll('.muscle-button').forEach(btn => {
      if (!defaults.includes(btn.getAttribute('data-muscle-id'))) btn.remove();
    });
    customMuscles.forEach(m => createMuscleButtonOnDOM(m));
  }

  function confirmAddMuscle() {
    const name = input.value.trim(); if (name === "") return;
    const formattedName = name.toLowerCase();
    const defaults = ['peito', 'costa', 'ombro', 'tríceps', 'bíceps', 'pernas'];
    if (customMuscles.includes(formattedName) || defaults.includes(formattedName)) { alert("Grupo muscular já cadastrado!"); return; }
    customMuscles.push(formattedName); localStorage.setItem('custom_muscles', JSON.stringify(customMuscles));
    createMuscleButtonOnDOM(name); closeAddModal();
  }

  function createMuscleButtonOnDOM(name) {
    const container = document.getElementById('muscle-container');
    const addButton = document.getElementById('btn-add-muscle');
    const newMuscle = document.createElement('a');
    newMuscle.className = 'muscle-button';
    newMuscle.setAttribute('data-muscle-id', name.toLowerCase());
    newMuscle.innerHTML = `
      <div class="muscle-info-wrapper">
        <button class="muscle-manage-btn" onclick="openMuscleManageModal('${name.toLowerCase()}')">⚙</button>
        <span class="muscle-name">${name.charAt(0).toUpperCase() + name.slice(1)}</span>
      </div>
      <div class="muscle-right-side">
        <div class="muscle-graphic">
          <img src="peck-deck.mp4" alt="${name}">
        </div>
      </div>
    `;
    registerMuscleBtnClick(newMuscle, name);
    container.insertBefore(newMuscle, addButton);
  }

  const exercisesGrid = document.getElementById('exercisesGrid');
  const backToGridBtn = document.getElementById('backToGridBtn');
  const addNewExerciseBtn = document.getElementById('addNewExerciseBtn');
  const generalHistoryContainer = document.getElementById('generalHistoryContainer');
  const filterAllBtn = document.getElementById('filterAllBtn');
  const filterFavsBtn = document.getElementById('filterFavsBtn');
  const filterHistoryBtn = document.getElementById('filterHistoryBtn');
  let currentFilter = 'all'; let activeExerciseId = null; let isEditingMode = true;

  function isVideoFile(path) { return /\.(mp4|webm|mov|ogg)$/i.test(path || ""); }

  function renderExercises() {
    exercisesGrid.innerHTML = "";
    const filtered = workoutDatabase.filter(item => item.muscle === activeMuscleGroup);
    if (filtered.length === 0) {
      exercisesGrid.innerHTML = `<div style="grid-column: span 2; text-align: center; color: var(--text-dim); padding: 40px 10px;">Nenhum exercício cadastrado.</div>`;
      return;
    }
    filtered.forEach(ex => {
      const card = document.createElement('div');
      card.className = `exercise-card ${ex.completedToday ? 'completed' : ''}`;
      card.setAttribute('data-id', ex.id);
      let mediaHtml;
      if (!ex.image) {
        mediaHtml = `<svg class="illustration" viewBox="0 0 100 100" fill="none"><line x1="15" y1="50" x2="85" y2="50" stroke="#252932" stroke-width="4"/><circle cx="50" cy="50" r="7" fill="#FF7A3D" /></svg>`;
      } else if (isVideoFile(ex.image)) {
        mediaHtml = `<video src="${ex.image}" autoplay loop muted playsinline disablePictureInPicture disableRemotePlayback controlsList="nodownload nofullscreen noremoteplayback"></video>`;
      } else {
        mediaHtml = `<img src="${ex.image}">`;
      }
      
      card.innerHTML = `
        <div class="card-media">
          ${ex.completedToday ? '<div class="completed-badge">✓</div>':''}
          <button class="favorite-btn ${ex.isFavorite ? 'active':''}" onclick="toggleFavorite('${ex.id}', event)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
          </button>
          ${mediaHtml}
        </div>
        <div class="card-info">
          <span class="exercise-title">${ex.name}</span>
          <span class="exercise-variation">${ex.variation || ''}</span>
        </div>`;
      exercisesGrid.appendChild(card);
    });
    applyFilters();
  }

  function toggleFavorite(id, event) { event.stopPropagation(); const ex = workoutDatabase.find(i => i.id === id); if (ex) { ex.isFavorite = !ex.isFavorite; saveDatabase(); renderExercises(); } }

  function applyFilters() {
    const cards = exercisesGrid.querySelectorAll('.exercise-card');
    if (currentFilter === 'history') { 
      exercisesGrid.style.display = 'none'; 
      generalHistoryContainer.style.display = 'flex'; 
      
      const muscleHistory = historyDatabase[activeMuscleGroup] || [];
      if(muscleHistory.length === 0) {
        generalHistoryContainer.innerHTML = '<div class="history-wrapper" style="text-align:center; color: var(--text-dim);">Sem histórico de treinos.</div>';
      } else {
        const lastTwoDays = muscleHistory.slice(0, 2);
        let htmlStr = '<div class="history-wrapper">';
        lastTwoDays.forEach(day => {
          htmlStr += `<div class="history-day-group"><span class="history-day-title">${day.date}:</span><div class="history-day-list">`;
          day.exercises.forEach(ex => {
            htmlStr += `<div class="history-day-item"><span class="ex-name">${ex.name}</span><span class="ex-weight" style="color: var(--amber);">${ex.weight}</span></div>`;
          });
          htmlStr += `</div></div><hr style="border:none; border-top:1px solid rgba(255,255,255,0.05); margin:8px 0;">`;
        });
        htmlStr += '</div>';
        generalHistoryContainer.innerHTML = htmlStr;
      }
    } 
    else {
      exercisesGrid.style.display = 'grid'; generalHistoryContainer.style.display = 'none';
      cards.forEach(card => {
        const ex = workoutDatabase.find(i => i.id === card.getAttribute('data-id'));
        card.style.display = currentFilter === 'favs' ? ((ex && ex.isFavorite) ? 'flex' : 'none') : 'flex';
      });
    }
  }

  filterAllBtn.addEventListener('click', () => { currentFilter = 'all'; updateFilterButtons(filterAllBtn); applyFilters(); });
  filterFavsBtn.addEventListener('click', () => { currentFilter = 'favs'; updateFilterButtons(filterFavsBtn); applyFilters(); });
  filterHistoryBtn.addEventListener('click', () => { currentFilter = 'history'; updateFilterButtons(filterHistoryBtn); applyFilters(); });
  function updateFilterButtons(act) { [filterAllBtn, filterFavsBtn, filterHistoryBtn].forEach(b => b.classList.remove('active')); act.classList.add('active'); }

  exercisesGrid.addEventListener('click', (e) => { 
    const card = e.target.closest('.exercise-card'); 
    if (!card || e.target.closest('.favorite-btn')) return; 
    
    const id = card.getAttribute('data-id');
    const ex = workoutDatabase.find(i => i.id === id);
    
    if (ex && ex.completedToday) {
      openBlockModal(); 
      return;
    }

    activeExerciseId = id; 
    loadExerciseToDetail(activeExerciseId);

  let timerInterval = null; let defaultRestTime = 60; let timeRemaining = 60; let seriesFeitasCount = 0; let totalSeriesGoal = 3; let repsPerSeries = 10; let pesoKg = '20';

  function loadExerciseToDetail(id) {
    const ex = workoutDatabase.find(i => i.id === id); if (!ex) return;
    exName.textContent = ex.name + " " + (ex.variation || ""); exImage.src = ex.image || "peck-deck.mp4"; exImage.load(); exImage.play().catch(()=>{});
    totalSeriesGoal = ex.series; repsPerSeries = ex.reps; pesoKg = ex.weight; defaultRestTime = ex.rest; seriesFeitasCount = ex.completedToday ? totalSeriesGoal : 0;
    if (timerInterval) stopTimer(); updateMetricsDisplay();
  }

  function updateMetricsDisplay() {
    exRepsText.textContent = repsPerSeries; tagWeightDisplay.textContent = pesoKg.includes('kg') ? pesoKg : `${pesoKg}kg`;
    exSeriesText.textContent = seriesFeitasCount >= totalSeriesGoal ? "Concluído!" : `${seriesFeitasCount} / ${totalSeriesGoal}`;
    seriesBtn.style.background = seriesFeitasCount >= totalSeriesGoal ? 'var(--amber)' : `conic-gradient(var(--amber) ${(seriesFeitasCount/totalSeriesGoal)*360}deg, rgba(255,255,255,0.1) 0deg)`;
    contentHistoricoIndividual.innerHTML = `<div class="history-day-item"><span>Meta atual</span><span>${totalSeriesGoal}S - ${repsPerSeries}R @ ${pesoKg}kg</span></div>`;
  }

  seriesBtn.addEventListener('click', () => {
    if (seriesFeitasCount < totalSeriesGoal) { seriesFeitasCount++; } else { seriesFeitasCount = 0; }
    const ex = workoutDatabase.find(i => i.id === activeExerciseId);
    if (ex) { 
      ex.completedToday = seriesFeitasCount >= totalSeriesGoal; 
      saveDatabase(); 
      renderExercises(); 
      if (ex.completedToday) {
        registrarExercicioConcluido(ex.muscle);
        if (!historyDatabase[activeMuscleGroup]) historyDatabase[activeMuscleGroup] = [];
        let logIndex = historyDatabase[activeMuscleGroup].findIndex(h => h.date === "Hoje");
        const exFullName = `${ex.name} ${ex.variation || ''}`.trim();
        if(logIndex === -1) {
          historyDatabase[activeMuscleGroup].unshift({ date: "Hoje", exercises: [{ name: exFullName, weight: pesoKg.includes('kg') ? pesoKg : `${pesoKg}kg` }] });
        }
        localStorage.setItem('workout_history_db', JSON.stringify(historyDatabase));

        updateMetricsDisplay();
        setTimeout(() => {
          changeScreen('treinos');
          openBlockModal(); 
        }, 800);
        return;

  });

  restBtn.addEventListener('click', () => { if (timerInterval) { stopTimer(); } else { startTimer(); } });
  function startTimer() { timeRemaining = defaultRestTime; restDisplay.textContent = timeRemaining; timerInterval = setInterval(() => { timeRemaining--; restDisplay.textContent = timeRemaining; if (timeRemaining <= 0) stopTimer(); }, 1000); }

    if (isEditingMode) {
      const ex = workoutDatabase.find(i => i.id === activeExerciseId);
      if (ex) {

  function iniciarLogicaTelaPerfil() {
  // CONTROLES DOS MODAIS

  const openTargetWeightModalBtn = document.getElementById('open-target-weight-modal-btn');
  const closeTargetWeightModalBtn = document.getElementById('close-target-weight-modal-btn');

  const targetDateInput = document.getElementById('target-date-input');

  const openMeasuresModalBtn = document.getElementById('open-measures-modal-btn');
  const closeMeasuresModalBtn = document.getElementById('close-measures-modal-btn');
  const measuresModal = document.getElementById('measures-modal');
  const measuresForm = document.getElementById('measures-form');

  const prevHistoryBtn = document.getElementById('prev-history-btn');
  const nextHistoryBtn = document.getElementById('next-history-btn');
  const measuresDateHeader = document.getElementById('measures-date-header');

  // MODAL DE FOTOS
  const openPhotosModalBtn = document.getElementById('open-photos-modal-btn');
  const closePhotosModalBtn = document.getElementById('close-photos-modal-btn');
  const photosModal = document.getElementById('photos-modal');
  const photosForm = document.getElementById('photos-form');

  let dataMudancaAtual = null;
  let membroDesdeDefinido = false;

  let mesInicialIndex = null;  
  let mesFinalIndex = null;    
  const nomesMesesAbreviados = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
  
  let valorPesoAtualSalvo = null;
  let valorPesoFocoSalvo = null;
  let registrosPesosHistorico = {}; 
  let dataMetaSalvaFormatada = null; 

  let historicoDeMedidasRegistradas = []; 
  let indiceDoRegistroAtualVisualizado = -1; 

  // Abre/fecha Modais padrão
  openProfileModalBtn.addEventListener('click', () => profileModal.classList.add('open'));
  closeProfileModalBtn.addEventListener('click', () => profileModal.classList.remove('open'));
  profileModal.addEventListener('click', (e) => { if (e.target === profileModal) profileModal.classList.remove('open'); });

  openWeightModalBtn.addEventListener('click', () => {
    dataMudancaAtual = new Date();
    const dia = String(dataMudancaAtual.getDate()).padStart(2, '0');
    const mes = String(dataMudancaAtual.getMonth() + 1).padStart(2, '0');
    const ano = dataMudancaAtual.getFullYear();
    weightInputDisplay.value = `${dia}/${mes}/${ano}`;
    weightModal.classList.add('open');
  });
  closeWeightModalBtn.addEventListener('click', () => weightModal.classList.remove('open'));

  openTargetWeightModalBtn.addEventListener('click', () => {
    const hoje = new Date();
    targetDateInput.min = `${hoje.getFullYear()}-${String(hoje.getMonth() + 1).padStart(2, '0')}`;
    targetWeightModal.classList.add('open');
  });
  closeTargetWeightModalBtn.addEventListener('click', () => targetWeightModal.classList.remove('open'));

  openMeasuresModalBtn.addEventListener('click', () => {
    const ativo = historicoDeMedidasRegistradas[historicoDeMedidasRegistradas.length - 1] || { valores: {} };
    document.getElementById('input-ombro').value = ativo.valores.ombro || '';
    document.getElementById('input-peito').value = ativo.valores.peito || '';
    document.getElementById('input-costas').value = ativo.valores.costas || '';
    document.getElementById('input-biceps').value = ativo.valores.biceps || '';
    document.getElementById('input-triceps').value = ativo.valores.triceps || '';
    document.getElementById('input-cintura').value = ativo.valores.cintura || '';
    document.getElementById('input-coxa').value = ativo.valores.coxa || '';
    document.getElementById('input-panturrilha').value = ativo.valores.panturrilha || '';
    measuresModal.classList.add('open');
  });
  closeMeasuresModalBtn.addEventListener('click', () => measuresModal.classList.remove('open'));

  // Abre/fecha Modal Fotos
  openPhotosModalBtn.addEventListener('click', (e) => { e.preventDefault(); photosModal.classList.add('open'); });
  closePhotosModalBtn.addEventListener('click', () => photosModal.classList.remove('open'));
  photosModal.addEventListener('click', (e) => { if (e.target === photosModal) photosModal.classList.remove('open'); });

  document.getElementById('file-after').addEventListener('change', function() {
    this.previousElementSibling.textContent = this.files[0] ? this.files[0].name.substring(0, 12) + '...' : 'Selecionar Imagem';
  });

  // SUBMIT DO FORMULÁRIO DE FOTOS COM TRANSLADO AUTOMÁTICO (ATUAL -> ANTERIOR)
  photosForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const type = document.getElementById('select-photo-type').value;
    const fileAfter = document.getElementById('file-after').files[0];
    
    const agora = new Date();
    const dataAtualSistema = `${String(agora.getDate()).padStart(2, '0')}/${String(agora.getMonth() + 1).padStart(2, '0')}/${agora.getFullYear()}`;

    if (fileAfter) {
      const boxAfter = document.getElementById(`pbox-${type}-after`);
      const boxBefore = document.getElementById(`pbox-${type}-before`);
      const lblAfter = document.getElementById(`lbl-${type}-after`);
      const lblBefore = document.getElementById(`lbl-${type}-before`);

      // 1. Se já existir uma imagem no campo "Foto Atual", move ela para "Foto Anterior"
      if (boxAfter.querySelector('img')) {
        boxBefore.innerHTML = boxAfter.innerHTML;
        lblBefore.textContent = lblAfter.textContent;
      }

      // 2. Carrega a nova imagem selecionada direto na "Foto Atual"
      const reader = new FileReader();
      reader.onload = function(e) {
        boxAfter.innerHTML = `<img src="${e.target.result}" alt="Depois">`;
      };
      reader.readAsDataURL(fileAfter);
      lblAfter.textContent = dataAtualSistema;
    }

    photosForm.reset();
    document.querySelectorAll('.custom-file-upload').forEach(lbl => lbl.textContent = 'Selecionar Imagem');
    photosModal.classList.remove('open');
    definirMembroDesde();

  // CONFIGURAÇÃO INICIAL DO CHART.JS
  const ctx = document.getElementById('meuGrafico').getContext('2d');
  const meuGrafico = new Chart(ctx, {
      type: 'line',
      data: {
          labels: ['', '', '', '', '', ''], 
          datasets: [
              {
                  label: 'Peso Atual',
                  data: [null, null, null, null, null, null],
                  borderColor: '#ff7a45', 
                  backgroundColor: '#ff7a45',
                  borderWidth: 3,
                  tension: 0.4, 
                  spanGaps: true, 
                  pointBackgroundColor: '#ffffff',
                  pointBorderColor: '#ff7a45',
                  pointBorderWidth: 2,
                  pointRadius: 5,
                  pointHoverRadius: 7

              },
              {
                  label: 'Ponto Foco',
                  data: [null, null, null, null, null, null],

                  backgroundColor: '#ffffff',
                  borderWidth: 3,
                  pointBackgroundColor: '#ffffff',
                  pointBorderColor: '#10b981',
                  pointBorderWidth: 2.5,
                  pointRadius: 6,
                  showLine: false
              }
          ]
      },
      options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
              legend: { display: false },
              tooltip: {
                  callbacks: {
                      title: function(context) {
                          const nomeMes = context[0].label;
                          const datasetIndex = context[0].datasetIndex;
                          if (datasetIndex === 2 && dataMetaSalvaFormatada) return dataMetaSalvaFormatada;
                          if (registrosPesosHistorico[nomeMes]) return registrosPesosHistorico[nomeMes].dataFormatada;
                          return nomeMes;
                      },
                      label: function(context) { return ` ${context.parsed.y} kg`; }
                  }
              }
          },
          scales: {
              x: { grid: { display: false }, ticks: { color: '#71717a' } },
              y: {
                  min: 40,
                  max: 150,
                  grid: { color: 'rgba(113, 113, 122, 0.08)' },
                  ticks: { color: '#71717a', stepSize: 10 }
              }
          }
      }
  });

  function recalcularGrafico() {
    if (mesInicialIndex === null) return;
    let mesesGerados = [];
    if (mesFinalIndex !== null) {
      let dif = mesFinalIndex - mesInicialIndex;
      if (dif < 0) dif += 12;
      for (let i = 0; i < 6; i++) {
        let index = Math.round(mesInicialIndex + (dif / 5) * i) % 12;
        mesesGerados.push(nomesMesesAbreviados[index]);
      }
    } else {
      for (let i = 0; i < 6; i++) {
        let index = (mesInicialIndex + i) % 12;
        mesesGerados.push(nomesMesesAbreviados[index]);
      }
    }

    meuGrafico.data.labels = mesesGerados;
    const novosDadosPesos = Array(6).fill(null);
    mesesGerados.forEach((nomeMes, index) => {
      if (registrosPesosHistorico[nomeMes] !== undefined) {
        novosDadosPesos[index] = registrosPesosHistorico[nomeMes].peso;
      }
    });

    if (valorPesoAtualSalvo !== null) novosDadosPesos[0] = valorPesoAtualSalvo;
    meuGrafico.data.datasets[0].data = novosDadosPesos;

    if (valorPesoFocoSalvo !== null) {
      meuGrafico.data.datasets[1].data = Array(6).fill(valorPesoFocoSalvo);
      meuGrafico.data.datasets[2].data = [null, null, null, null, null, valorPesoFocoSalvo];
      const menorPeso = Math.min(...novosDadosPesos.filter(p => p !== null), valorPesoFocoSalvo);
      const maiorPeso = Math.max(...novosDadosPesos.filter(p => p !== null), valorPesoFocoSalvo);
      meuGrafico.options.scales.y.min = Math.floor((menorPeso - 10) / 10) * 10;
      meuGrafico.options.scales.y.max = Math.ceil((maiorPeso + 20) / 10) * 10;
    }
    meuGrafico.update();
  }

  weightForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const novoPeso = parseFloat(document.getElementById('weight-input-value').value);
    if (!isNaN(novoPeso) && novoPeso > 0 && dataMudancaAtual) {
      document.getElementById('display-weight').textContent = novoPeso.toFixed(1).replace('.', ',') + ' kg';
      const mesDoLançamento = dataMudancaAtual.getMonth();
      const nomeMesLançamento = nomesMesesAbreviados[mesDoLançamento];
      if (mesInicialIndex === null) {
        mesInicialIndex = mesDoLançamento;
        valorPesoAtualSalvo = novoPeso;
      }
      registrosPesosHistorico[nomeMesLançamento] = { peso: novoPeso, dataFormatada: `${String(dataMudancaAtual.getDate()).padStart(2, '0')}/${nomeMesLançamento}` };
      registrarPeso(novoPeso);
      recalcularGrafico();
      definirMembroDesde();
    }
    weightForm.reset();
    weightModal.classList.remove('open');
  });

  targetWeightForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const novoFoco = parseFloat(document.getElementById('target-weight-input').value);
    const inputVal = targetDateInput.value;
    const [anoStr, mesStr] = inputVal.split('-');
    const dataMetaInput = new Date(parseInt(anoStr), parseInt(mesStr) - 1, 1);

    if (!isNaN(novoFoco) && novoFoco > 0 && inputVal) {
      document.getElementById('display-target-weight').textContent = novoFoco.toFixed(1).replace('.', ',') + ' kg';
      const stringMes = nomesMesesAbreviados[dataMetaInput.getMonth()];
      const stringAno = dataMetaInput.getFullYear();
      document.getElementById('display-goal-date').textContent = `Até ${stringMes}/${stringAno}`;
      valorPesoFocoSalvo = novoFoco;
      mesFinalIndex = dataMetaInput.getMonth();
      dataMetaSalvaFormatada = `${stringMes}/${stringAno}`;
      if (mesInicialIndex === null) mesInicialIndex = new Date().getMonth();
      recalcularGrafico();
      definirMembroDesde();
    }
    targetWeightForm.reset();
    targetWeightModal.classList.remove('open');
  });

  function obterDataFormatadaAtual() {
    const d = new Date();
    return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
  }

  function renderizarRegistroDeMedidas(index) {
    if (index < 0 || index >= historicoDeMedidasRegistradas.length) return;
    const registroVisualizado = historicoDeMedidasRegistradas[index];
    const registroAnterior = index > 0 ? historicoDeMedidasRegistradas[index - 1] : null;

    measuresDateHeader.textContent = `(${registroVisualizado.data})`;
    const ehMaisRecente = (index === historicoDeMedidasRegistradas.length - 1);
    openMeasuresModalBtn.style.display = ehMaisRecente ? 'inline-flex' : 'none';

    const medidasChaves = ['ombro', 'peito', 'costas', 'biceps', 'triceps', 'cintura', 'coxa', 'panturrilha'];
    medidasChaves.forEach(chave => {
      const displayElem = document.getElementById(`val-${chave}`);
      const diffElem = document.getElementById(`diff-${chave}`);
      const valorAtual = registroVisualizado.valores[chave];

      if (valorAtual !== undefined && valorAtual !== null) {
        displayElem.textContent = `${valorAtual.toFixed(1).replace('.', ',')} cm`;
        if (registroAnterior && registroAnterior.valores[chave] !== null) {
          const valorAnterior = registroAnterior.valores[chave];
          const diferenca = valorAtual - valorAnterior;
          const sinal = diferenca > 0 ? '+' : '';
          diffElem.textContent = `${sinal}${diferenca.toFixed(1).replace('.', ',')} cm`;
          diffElem.className = 'measure-diff';
          if (diferenca > 0) diffElem.classList.add('positive');
          else if (diferenca < 0) diffElem.classList.add('negative');
          else { diffElem.classList.add('neutral'); diffElem.textContent = '— 0 cm'; }
        } else {
          diffElem.className = 'measure-diff neutral';
          diffElem.textContent = '— 0 cm';
        }
      } else {
        displayElem.textContent = '-- cm';
        diffElem.className = 'measure-diff neutral';
        diffElem.textContent = '— 0 cm';
      }
    });

    prevHistoryBtn.disabled = (index === 0);
    nextHistoryBtn.disabled = (index === historicoDeMedidasRegistradas.length - 1);
  }

  prevHistoryBtn.addEventListener('click', () => {
    if (indiceDoRegistroAtualVisualizado > 0) {
      indiceDoRegistroAtualVisualizado--;
      renderizarRegistroDeMedidas(indiceDoRegistroAtualVisualizado);
    }
  });

  nextHistoryBtn.addEventListener('click', () => {
    if (indiceDoRegistroAtualVisualizado < historicoDeMedidasRegistradas.length - 1) {
      indiceDoRegistroAtualVisualizado++;
      renderizarRegistroDeMedidas(indiceDoRegistroAtualVisualizado);
    }
  });

  measuresForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const novasMedidas = {};
    const medidasChaves = ['ombro', 'peito', 'costas', 'biceps', 'triceps', 'cintura', 'coxa', 'panturrilha'];
    let temValoresValidos = false;

    medidasChaves.forEach(chave => {
      const inputVal = parseFloat(document.getElementById(`input-${chave}`).value);
      if (!isNaN(inputVal) && inputVal > 0) {
        novasMedidas[chave] = inputVal;
        temValoresValidos = true;
      } else { novasMedidas[chave] = null; }
    });

    if (temValoresValidos) {
      const novaData = obterDataFormatadaAtual();
      if (historicoDeMedidasRegistradas.length > 0 && historicoDeMedidasRegistradas[historicoDeMedidasRegistradas.length - 1].data === novaData) {
        historicoDeMedidasRegistradas[historicoDeMedidasRegistradas.length - 1].valores = novasMedidas;
      } else {
        historicoDeMedidasRegistradas.push({ data: novaData, valores: novasMedidas });
      }
      indiceDoRegistroAtualVisualizado = historicoDeMedidasRegistradas.length - 1;
      renderizarRegistroDeMedidas(indiceDoRegistroAtualVisualizado);
    }
    definirMembroDesde();
    measuresModal.classList.remove('open');
  });

  function definirMembroDesde() {
    if (!membroDesdeDefinido) {
      const dataCadastro = new Date();
      document.getElementById('display-member-since').textContent = `${nomesMesesAbreviados[dataCadastro.getMonth()]}/${dataCadastro.getFullYear()}`;
      membroDesdeDefinido = true;
    }
  }

  profileForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const novoNome = document.getElementById('input-name').value;
    const novaAltura = document.getElementById('input-height').value;
    const novaMeta = document.getElementById('input-goal').value;
    const level = document.getElementById('input-level').value;

    document.getElementById('display-name').textContent = novoNome;
    document.getElementById('display-height').textContent = parseFloat(novaAltura).toFixed(2).replace('.', ',') + ' m';
    document.getElementById('display-goal-main').textContent = novaMeta;
    document.getElementById('display-level').textContent = 'Nível: ' + level;

    definirMembroDesde();

    const dotsContainer = document.getElementById('display-level-dots');
    if (level === 'Iniciante') dotsContainer.innerHTML = '<div class="dot active"></div><div class="dot"></div><div class="dot"></div>';
    else if (level === 'Intermediário') dotsContainer.innerHTML = '<div class="dot active"></div><div class="dot active"></div><div class="dot"></div>';
    else if (level === 'Avançado') dotsContainer.innerHTML = '<div class="dot active"></div><div class="dot active"></div><div class="dot active"></div>';

    document.getElementById('display-age').textContent = (new Date().getFullYear() - new Date(document.getElementById('input-birth').value).getFullYear()) + ' anos';
    profileModal.classList.remove('open');
  });
  }
</script>

</body>
</html>
